<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Assignment Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
    h1 { margin-bottom: 4px; }
    .subtitle { font-size: 0.9em; color: #666; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px; }
    .item {
      background: white; border-radius: 8px; padding: 14px;
      border: 3px solid #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .item.confirmed { border-color: #2a7a2a; }
    .item.uncertain { border-color: #f0a000; }
    .item img { width: 100%; border: 1px solid #eee; border-radius: 4px; margin: 8px 0; max-height: 280px; object-fit: contain; background: #fafafa; }
    .filename { font-size: 0.75em; color: #888; font-family: monospace; word-break: break-all; }
    .idx { font-size: 0.8em; font-weight: bold; color: #555; }
    .guess { margin-top: 6px; padding: 6px 10px; background: #f4f8ff; border-radius: 4px; font-size: 0.85em; }
    .guess strong { color: #4a6cf7; }
    .guess .desc { color: #555; font-size: 0.9em; margin-top: 2px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: bold; margin-left: 6px; }
    .badge.sure { background: #d4edda; color: #155724; }
    .badge.unsure { background: #fff3cd; color: #856404; }
    .newname { font-size: 0.8em; color: #333; margin-top: 4px; font-family: monospace; }
    .newname span { background: #eee; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>

<p class="subtitle">Green border = confident guess · Orange border = uncertain · Confirm before renaming</p>
<div class="grid" id="grid"></div>

  { idx:38, newname:"tosls-Q28.png",   label:"TOSLS Q28", desc:"Scatter plot \u2014 river shrimp abundance vs elevation",   conf:true },];

const grid = document.getElementById('grid');
FILES.forEach((file, i) => {
  const g = GUESSES[i] || { newname:'???', label:`Image ${i+1}`, desc:'', conf:false };
  const div = document.createElement('div');
  div.className = `item ${g.conf ? 'confirmed' : 'uncertain'}`;
  div.innerHTML = `
    <div class="idx">#${i+1} of ${FILES.length}</div>
    <div class="filename">${file}</div>
    <img src="${file}" alt="${file}" loading="lazy">
    <div class="guess">
      <strong>${g.label}</strong>
      <span class="badge ${g.conf ? 'sure' : 'unsure'}">${g.conf ? 'confident' : 'uncertain'}</span>
      <div class="desc">${g.desc}</div>
    </div>
    <div class="newname">→ <span>${g.newname}</span></div>
  `;
  grid.appendChild(div);
});
</script>
</body>
</html>
